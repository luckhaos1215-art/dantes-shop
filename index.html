<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dante's Shop</title>
    <style>
        .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .cta-button {
            padding: 10px 20px;

            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        .cta-button.discord {
            background-color: #7289DA;
        }
    </style>
</head>
<body>
    <div class="cta-section">
        <div class="cta-buttons">
            <a href="https://discord.gg/qSbH8KTB2" class="cta-button discord">Join Discord</a>
            <button class="cta-button">Comprar Agora</button>
        </div>
    </div>
    <!-- All other content remains the same -->

</html>
